<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Work in progress warning</title>
  <desc id="desc">Large warning banner telling visitors this repository is work in progress and not ready to clone or use.</desc>
  <rect width="1200" height="360" fill="#111827"/>
  <rect x="24" y="24" width="1152" height="312" rx="28" fill="#1f2937" stroke="#f59e0b" stroke-width="10"/>
  <text x="600" y="112" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="800" fill="#fbbf24">WORK IN PROGRESS</text>
  <text x="600" y="196" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="700" fill="#ffffff">DO NOT CLONE OR USE YET</text>
  <text x="600" y="266" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="500" fill="#d1d5db">APIs, packaging, releases, and generated output are unstable.</text>
</svg>
